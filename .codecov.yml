coverage:
  precision: 2
  round: nearest
  range: "80...100"
  status:
    project:
      sockify:
        threshold: 2%

component_management:
  default_rules:
    statuses:
      - type: sockify
        target: auto
  individual_components:
    - name: Core Library
      paths:
        - src/sockify/lib/**
        - src/sockify/include/**
    - name: Command Line Interface
      paths:
        - src/sockify/cli/**

ignore:
  - ^(?!src).*

comment:
  layout: "header, diff, components"
  behavior: once
